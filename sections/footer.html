<!-- Skoll Digital – Standalone Footer (HTML + scoped CSS + JS) -->
<footer class="skoll-footer-wrapper" data-section="footer">
  <style>
    .skoll-footer-wrapper {
      --foot-bg: #0A0A0A; 
      --foot-gold: #C9A84C;
      --foot-text: #FAFAFA;
      --foot-muted: #888888;
      --foot-border: rgba(240, 238, 233, 0.1);
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--foot-bg);
      position: relative;
      padding: 120px 0 0 0; /* No extreme bottom padding, giant text sits at baseline */
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .skoll-footer-wrapper * { box-sizing: border-box; }
    
    .skoll-footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }

    /* Top: Newsletter */
    .skoll-footer-newsletter {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 120px;
      opacity: 0;
      transform: translateY(20px);
    }
    .skoll-footer-nl-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 400;
      color: var(--foot-text);
      margin: 0 0 32px;
      line-height: 1.1;
    }
    .skoll-footer-form {
      display: flex;
      width: 100%;
      max-width: 500px;
      border-bottom: 1px solid var(--foot-border);
      padding-bottom: 12px;
      position: relative;
    }
    .skoll-footer-form::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 0%;
      height: 1px;
      background: var(--foot-gold);
      transition: width 0.4s ease;
    }
    .skoll-footer-form:focus-within::after {
      width: 100%;
    }
    .skoll-footer-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--foot-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.125rem;
    }
    .skoll-footer-input::placeholder {
      color: var(--foot-muted);
    }
    .skoll-footer-submit {
      background: transparent;
      border: none;
      color: var(--foot-text);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s ease, transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
    }
    .skoll-footer-submit:hover {
      color: var(--foot-gold);
      transform: translateX(4px);
    }

    /* Middle: Grid */
    .skoll-footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 64px 32px;
      margin-bottom: 120px;
    }
    @media (max-width: 1024px) {
      .skoll-footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .skoll-footer-grid { grid-template-columns: 1fr; gap: 56px; margin-bottom: 80px; }
    }
    .skoll-footer-col {
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
    }
    .skoll-footer-desc {
      font-size: 1.125rem;
      color: var(--foot-muted);
      line-height: 1.6;
      max-width: 320px;
      margin: 0;
    }
    .skoll-footer-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--foot-text);
      margin-bottom: 32px;
    }
    .skoll-footer-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .skoll-footer-link {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--foot-muted);
      text-decoration: none;
      transition: color 0.3s ease, transform 0.3s ease;
      width: fit-content;
    }
    .skoll-footer-link:hover {
      color: var(--foot-gold);
      transform: translateX(4px);
    }

    /* Bottom: Giant Text & Copyright */
    .skoll-footer-bottom-area {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }
    .skoll-footer-copyright {
      font-size: 0.875rem;
      color: var(--foot-muted);
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 1400px;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      padding: 0 24px;
      opacity: 0;
    }
    @media (max-width: 600px) {
      .skoll-footer-copyright { flex-direction: column; gap: 8px; align-items: center; bottom: 16px; }
    }
    .skoll-footer-giant {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 24vw; /* Scales massively with viewport */
      font-weight: 400;
      line-height: 0.75;
      color: var(--foot-text);
      white-space: nowrap;
      text-align: center;
      width: 100%;
      overflow: hidden;
      margin-top: 40px;
      position: relative;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transform: translateY(100px);
    }
  </style>

  <div class="skoll-footer-inner">
    
    <div class="skoll-footer-newsletter" id="skoll-footer-nl">
      <h3 class="skoll-footer-nl-title">Stay sharp. Join the inner circle.</h3>
      <form class="skoll-footer-form" onsubmit="event.preventDefault();">
        <input type="email" class="skoll-footer-input" placeholder="Your email address" required>
        <button type="submit" class="skoll-footer-submit" aria-label="Subscribe">→</button>
      </form>
    </div>

    <div class="skoll-footer-grid" id="skoll-footer-grid">
      <div class="skoll-footer-col">
        <p class="skoll-footer-desc">Skoll Digital.<br>Compounding growth for the unrelenting.</p>
      </div>
      <div class="skoll-footer-col">
        <span class="skoll-footer-label">Navigate</span>
        <div class="skoll-footer-links">
          <a href="#services" class="skoll-footer-link">Services</a>
          <a href="#work" class="skoll-footer-link">Work</a>
          <a href="#testimonials" class="skoll-footer-link">Testimonials</a>
        </div>
      </div>
      <div class="skoll-footer-col">
        <span class="skoll-footer-label">Socials</span>
        <div class="skoll-footer-links">
          <a href="https://linkedin.com" class="skoll-footer-link" target="_blank">LinkedIn</a>
          <a href="https://x.com" class="skoll-footer-link" target="_blank">X (Twitter)</a>
          <a href="https://instagram.com" class="skoll-footer-link" target="_blank">Instagram</a>
        </div>
      </div>
      <div class="skoll-footer-col">
        <span class="skoll-footer-label">Contact</span>
        <div class="skoll-footer-links">
          <a href="mailto:hello@skolldigital.com" class="skoll-footer-link">hello@skolldigital.com</a>
          <a href="tel:+10000000000" class="skoll-footer-link">+1 (800) 123-4567</a>
        </div>
      </div>
    </div>
  </div>

  <div class="skoll-footer-bottom-area">
    <div class="skoll-footer-giant" id="skoll-footer-giant">SKOLL</div>
    <div class="skoll-footer-copyright" id="skoll-footer-copy">
      <span>© 2026 Skoll Digital</span>
      <span>All rights reserved.</span>
    </div>
  </div>

  <script>
    (function () {
      var wrapper = document.querySelector('.skoll-footer-wrapper');
      if (!wrapper) return;

      function runFooterJS() {
        var gsap = window.gsap;
        var ScrollTrigger = window.ScrollTrigger;
        if (!gsap || !ScrollTrigger) {
          setTimeout(runFooterJS, 50);
          return;
        }
        gsap.registerPlugin(ScrollTrigger);

        var nl = document.getElementById('skoll-footer-nl');
        var cols = document.querySelectorAll('.skoll-footer-col');
        var copy = document.getElementById('skoll-footer-copy');
        var giant = document.getElementById('skoll-footer-giant');

        var tl = gsap.timeline({
          scrollTrigger: {
            trigger: wrapper,
            start: 'top 80%',
            toggleActions: 'play none none none'
          }
        });

        tl.to(nl, { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' })
          .to(cols, { opacity: 1, y: 0, duration: 0.8, stagger: 0.1, ease: 'power2.out' }, "-=0.4")
          .to(giant, { opacity: 1, y: 0, duration: 1.2, ease: 'back.out(1.2)' }, "-=0.4")
          .to(copy, { opacity: 1, duration: 0.6, ease: 'power2.out' }, "-=0.8");
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runFooterJS);
      } else {
        runFooterJS();
      }
    })();
  </script>
</footer>
