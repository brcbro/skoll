<!-- Skoll Digital – Standalone Hero (HTML + scoped CSS + JS) -->
<section class="skoll-hero-wrapper" data-section="hero">
  <style>
    /* —— Scoped Hero Styles (ultra-dark, premium) —— */
    .skoll-hero-wrapper {
      --hero-bg: #0A0A0A;
      --hero-gold: #C9A84C;
      --hero-text: #F0EEE9;
      --hero-muted: rgba(240, 238, 233, 0.75);
      font-family: 'DM Sans', system-ui, sans-serif;
      position: relative;
      min-height: 100vh;
      width: 100%;
      background: var(--hero-bg);
      display: flex;
      align-items: center; /* True vertical centering */
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      padding: 100px 0 80px 0; /* Fallback padding to ensure navbar space */
    }
    .skoll-hero-wrapper * { box-sizing: border-box; }

    /* Backgrounds */
    .skoll-hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      filter: saturate(0.75) contrast(1.08);
      z-index: 0;
    }
    .skoll-hero-bg { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .skoll-hero-grid {
      position: absolute; inset: 0; opacity: 0.05;
      background-image: linear-gradient(rgba(240, 238, 233,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(240, 238, 233,0.08) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .skoll-hero-blob {
      position: absolute; top: -20%; right: -10%; width: 80vmin; height: 80vmin;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(201, 168, 76, 0.18) 0%, rgba(201, 168, 76, 0.06) 40%, transparent 70%);
      border-radius: 50%;
    }

    /* —— Content Layout —— */
    .skoll-hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 24px;
      width: 85%;
      max-width: 1200px; /* Reduced width for tight, editorial alignment */
      margin: 0 auto;
    }

    .skoll-hero-tag {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--hero-gold);
      opacity: 0;
      transform: translateY(20px);
      mix-blend-mode: difference;
    }

    .skoll-hero-headline {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(3rem, 7vw, 5.5rem); /* Clamped gracefully so it never breaks layout */
      font-weight: 400;
      line-height: 1.05;
      color: var(--hero-text);
      margin: 0;
      opacity: 0;
      transform: translateY(20px);
      mix-blend-mode: difference;
    }
    .skoll-hero-headline .skoll-hero-gold {
      font-style: italic;
      color: var(--hero-gold);
    }

    .skoll-hero-subtext {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      line-height: 1.6;
      color: var(--hero-muted);
      max-width: 600px;
      margin: 0;
      opacity: 0;
      transform: translateY(20px);
      mix-blend-mode: difference;
    }

    /* —— CTA buttons —— */
    .skoll-hero-cta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
      opacity: 0;
      transform: translateY(20px);
    }
    .skoll-hero-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      font-family: 'Söhne', 'Sohne', 'Inter', system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.3s ease, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      white-space: nowrap;
    }
    .skoll-hero-btn-primary {
      background: var(--hero-gold);
      color: #0A0A0A;
      border: 1px solid var(--hero-gold);
    }
    .skoll-hero-btn-primary:hover {
      box-shadow: 0 0 32px rgba(201, 168, 76, 0.4);
      transform: translateY(-2px);
    }
    .skoll-hero-btn-ghost {
      background: rgba(240, 238, 233, 0.04);
      color: var(--hero-text);
      border: 1px solid rgba(240, 238, 233, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .skoll-hero-btn-ghost:hover {
      border-color: var(--hero-gold);
      color: var(--hero-gold);
      transform: translateY(-2px);
    }
    .skoll-hero-btn-arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    .skoll-hero-btn:hover .skoll-hero-btn-arrow {
      transform: translateX(4px);
    }

    .skoll-hero-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 48px; /* Extra spacing to push it down */
      align-self: flex-end; /* Shifts to the right side */
      opacity: 0;
      transform: translateY(20px);
      mix-blend-mode: difference;
    }
    .skoll-hero-line {
      width: 40px;
      height: 1px;
      background: var(--hero-gold);
      flex-shrink: 0;
    }
    .skoll-hero-footer p {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      font-style: italic;
      color: var(--hero-gold);
      margin: 0;
      white-space: nowrap;
      padding-right: 8px; /* Fixes italic tail clipping */
      padding-bottom: 4px; /* Fixes descender clipping */
    }

    /* Extremely graceful mobile adaptation */
    @media (max-width: 768px) {
      .skoll-hero-inner {
        gap: 20px;
        width: 85%;
      }
      .skoll-hero-headline {
        font-size: clamp(2.5rem, 10vw, 4rem); /* Beautiful mobile fit */
      }
      .skoll-hero-subtext {
        font-size: 1rem;
        max-width: 100%;
      }
      .skoll-hero-footer p {
        font-size: 1.25rem;
      }
    }

    /* —— Scroll hint —— */
    .skoll-hero-scroll {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }
    .skoll-hero-scroll-text {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240, 238, 233, 0.5);
      animation: skoll-hero-scroll-breathe 2.5s ease-in-out infinite;
    }
    @keyframes skoll-hero-scroll-breathe {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Background video: Comp 2.mp4 on desktop, Comp 1_3.mp4 on mobile (set by JS) -->
  <video class="skoll-hero-video" autoplay muted playsinline loop aria-hidden="true"></video>

  <!-- Background stack -->
  <div class="skoll-hero-bg">
    <div class="skoll-hero-grid" aria-hidden="true"></div>
    <div class="skoll-hero-blob" id="skoll-hero-blob" aria-hidden="true"></div>
  </div>

  <!-- Main content -->
  <div class="skoll-hero-inner">
    <h1 class="skoll-hero-headline skoll-hero-anim">
      We don't chase<br>
      growth.<br>
      We <span class="skoll-hero-gold">engineer</span> it.
    </h1>
    
    <p class="skoll-hero-subtext skoll-hero-anim">
      Strategy, product, performance, and<br>
      brand — integrated into one system that<br>
      compounds. For founders, CEOs, and<br>
      leadership teams who think long-term.
    </p>

    <div class="skoll-hero-cta-row skoll-hero-anim">
      <a href="mailto:hello@skolldigital.com" class="skoll-hero-btn skoll-hero-btn-primary">
        Book a strategy call
        <span class="skoll-hero-btn-arrow" aria-hidden="true">→</span>
      </a>
      <a href="case-studies.html" class="skoll-hero-btn skoll-hero-btn-ghost">
        See our work
      </a>
    </div>

    <div class="skoll-hero-footer skoll-hero-anim">
      <div class="skoll-hero-line"></div>
      <p>Grow with intent.</p>
    </div>
  </div>

  <!-- Scroll hint -->
  <div class="skoll-hero-scroll" aria-hidden="true">
    <span class="skoll-hero-scroll-text">Scroll</span>
  </div>

  <script>
    (function () {
      var wrapper = document.querySelector('.skoll-hero-wrapper');
      if (!wrapper) return;
      var video = wrapper.querySelector('.skoll-hero-video');
      var MOBILE_BREAKPOINT = 768;
      var currentHeroSource = null;
      var resizeTimeout;

      function isMobile() { return window.innerWidth <= MOBILE_BREAKPOINT; }
      function setHeroVideoSource() {
        if (!video) return;
        var src = isMobile() ? 'Comp%201_3.mp4' : 'Comp%202.mp4';
        if (currentHeroSource === src) return;
        currentHeroSource = src;
        video.src = src;
        video.load();
        video.muted = true;
        video.play().catch(function () {});
      }
      setHeroVideoSource();
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(setHeroVideoSource, 250);
      });

      function runHeroJS() {
        var gsap = window.gsap;
        if (!gsap) {
          setTimeout(runHeroJS, 50);
          return;
        }

        var animElements = document.querySelectorAll('.skoll-hero-anim');
        var blob = document.getElementById('skoll-hero-blob');

        // Ensure background video plays even when section is loaded dynamically
        if (video) {
          video.muted = true;
          var playPromise = video.play();
          if (playPromise && typeof playPromise.then === 'function') {
            playPromise.catch(function () { /* ignore autoplay errors */ });
          }
        }

        // Custom staggered fade-up timeline
        var tl = gsap.timeline({
          defaults: { ease: 'power3.out' },
          paused: true
        });

        tl.to(animElements, {
          y: 0,
          opacity: 1,
          duration: 1,
          stagger: 0.15
        });

        // —— Gold blob breathing (8s loop) ——
        if (blob) {
          gsap.to(blob, {
            scale: 1.15,
            duration: 4,
            ease: 'sine.inOut',
            repeat: -1,
            yoyo: true
          });
        }

        // —— Parallax zoom on hero video tied to scroll ——
        if (video && window.ScrollTrigger) {
          gsap.set(video, { transformOrigin: '50% 50%', willChange: 'transform' });
          gsap.fromTo(video,
            { scale: 1, yPercent: 0 },
            {
              scale: 1.25,
              yPercent: -8,
              ease: 'none',
              scrollTrigger: {
                trigger: wrapper,
                start: 'top top',
                end: 'bottom top',
                scrub: true,
                invalidateOnRefresh: true
              }
            }
          );
        }

        function startHeroAnimation() {
          tl.play(0);
        }

        if (window.__skollPreloaderDone) {
          startHeroAnimation();
        } else if (window.addEventListener) {
          window.addEventListener('skoll:preloader:done', function () {
            startHeroAnimation();
          }, { once: true });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runHeroJS);
      } else {
        runHeroJS();
      }
    })();
  </script>
</section>
