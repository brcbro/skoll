<!-- Skoll Digital – Standalone Hero (HTML + scoped CSS + JS) -->
<section class="skoll-hero-wrapper" data-section="hero">
  <style>
    /* —— Scoped Hero Styles (ultra-dark, premium) —— */
    .skoll-hero-wrapper {
      --hero-bg: #0A0A0A;
      --hero-gold: #C9A84C;
      --hero-text: #FAFAFA;
      --hero-muted: #777777;
      --hero-radius: 999px;
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
      min-height: 100vh;
      width: 100%;
      background: var(--hero-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      /* Clear space for fixed navbar/logo so hero text doesn’t cover it */
      padding-top: 100px;
      /* So mix-blend-mode on content blends with video + layers inside hero */
      isolation: isolate;
    }
    .skoll-hero-wrapper * {
      box-sizing: border-box;
    }

    /* —— Background video + layers —— */
    .skoll-hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      filter: saturate(0.75) contrast(1.08);
      z-index: 0;
    }

    .skoll-hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    /* Noise overlay (disabled: no "rain" grain) */
    .skoll-hero-noise {
      display: none;
    }
    /* Faint grid */
    .skoll-hero-grid {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    /* Gold radial blob (distant sun) */
    .skoll-hero-blob {
      position: absolute;
      top: -20%;
      right: -10%;
      width: 80vmin;
      height: 80vmin;
      background: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        rgba(201, 168, 76, 0.18) 0%,
        rgba(201, 168, 76, 0.06) 40%,
        transparent 70%
      );
      border-radius: 50%;
    }
    /* Floating particles container (disabled: removes rain-like dots) */
    .skoll-hero-particles {
      display: none;
    }

    /* —— Content —— (no transform so mix-blend-mode can blend with video) */
    .skoll-hero-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 24px 48px;
      align-items: start;
      padding: 0 24px;
      max-width: 1100px;
      width: 100%;
      margin-top: -72px;
      color: #fff;
    }
    .skoll-hero-headline {
      font-family: 'Space Grotesk', 'Outfit', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: inherit;
      margin: 0;
      text-transform: uppercase;
      text-align: left;
      grid-column: 1;
      grid-row: 1;
      mix-blend-mode: difference;
    }
    .skoll-hero-title {
      display: inline-block;
    }
    .skoll-hero-row {
      display: flex;
      gap: 0.15em;
      flex-wrap: wrap;
    }
    .skoll-hero-row + .skoll-hero-row {
      margin-top: 0.1em;
      padding-left: 0;
    }
    .skoll-hero-chunk {
      display: flex;
      overflow: hidden;
    }
    .skoll-hero-chunk span {
      display: inline-block;
      transform: translateY(120%);
      opacity: 0;
    }
    .skoll-hero-chunk.sun span {
      color: var(--hero-gold);
      position: relative;
    }
    .skoll-hero-chunk.sun span::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 150%;
      height: 150%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(201, 168, 76, 0.28) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }
    .skoll-hero-subtext {
      font-size: clamp(0.9375rem, 1.5vw, 1.0625rem);
      line-height: 1.6;
      margin: 0;
      max-width: 420px;
      opacity: 0;
      color: rgba(255, 255, 255, 0.95);
      text-align: right;
      justify-self: end;
      grid-column: 2;
      grid-row: 2;
      mix-blend-mode: difference;
    }
    .skoll-hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-top: 0;
      opacity: 0;
      transform: translateY(24px);
      grid-column: 1 / -1;
      grid-row: 3;
      justify-self: center;
    }
    /* Mobile: tagline, subline above buttons, buttons at bottom */
    @media (max-width: 768px) {
      .skoll-hero-inner {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        gap: 24px;
        padding: 0 20px;
      }
      .skoll-hero-headline {
        grid-column: 1;
        grid-row: 1;
        text-align: left;
        margin-top: -32px;
      }
      /* Force "the Sun." onto the next line on mobile */
      .skoll-hero-row-2 {
        flex-wrap: wrap;
      }
      .skoll-hero-row-2 .skoll-hero-chunk.sun {
        width: 100%;
        padding-left: 0;
        text-align: left;
      }
      .skoll-hero-subtext {
        grid-column: 1;
        grid-row: 2;
        justify-self: end;
        text-align: right;
        max-width: 85%;
        margin-left: auto;
        line-height: 1.85;
        padding-left: 12%;
        margin-top: 32px;
      }
      .skoll-hero-buttons {
        grid-row: 3;
        margin-top: 24px;
      }
    }
    @media (max-width: 600px) {
      .skoll-hero-headline {
        font-size: clamp(1.8rem, 8vw, 2.6rem);
      }
      .skoll-hero-row {
        flex-wrap: wrap;
        gap: 0.1em;
      }
      .skoll-hero-row + .skoll-hero-row {
        margin-top: 0.15em;
      }
    }
    .skoll-hero-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: var(--hero-radius);
      transition: box-shadow 0.3s ease, transform 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .skoll-hero-btn-primary {
      color: #0A0A0A;
      background: var(--hero-gold);
    }
    .skoll-hero-btn-primary:hover {
      box-shadow: 0 0 28px rgba(201, 168, 76, 0.35);
      transform: translateY(-2px);
    }
    .skoll-hero-btn-secondary {
      color: var(--hero-text);
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
    }
    .skoll-hero-btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
    }

    /* —— Scroll hint: simple centered text with breathing animation —— */
    .skoll-hero-scroll {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }
    .skoll-hero-scroll-text {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--hero-muted);
      animation: skoll-hero-scroll-breathe 2.5s ease-in-out infinite;
    }
    @keyframes skoll-hero-scroll-breathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Background video: hero-mobile.mp4 on mobile, hero-pc.mp4 on desktop (set by JS) -->
  <video class="skoll-hero-video" autoplay muted playsinline loop aria-hidden="true"></video>

  <!-- Background stack -->
  <div class="skoll-hero-bg">
    <div class="skoll-hero-noise" aria-hidden="true"></div>
    <div class="skoll-hero-grid" aria-hidden="true"></div>
    <div class="skoll-hero-blob" id="skoll-hero-blob" aria-hidden="true"></div>
    <div class="skoll-hero-particles" id="skoll-hero-particles" aria-hidden="true"></div>
  </div>

  <!-- Main content -->
  <div class="skoll-hero-inner">
    <h1 class="skoll-hero-headline" id="skoll-hero-headline">
      <div class="skoll-hero-title">
        <div class="skoll-hero-row skoll-hero-row-1">
          <div class="skoll-hero-chunk" id="hero-we-dont"><span>We Don't</span></div>
          <div class="skoll-hero-chunk" id="hero-chase"><span>Chase</span></div>
          <div class="skoll-hero-chunk" id="hero-trends"><span>Trends.</span></div>
        </div>
        <div class="skoll-hero-row skoll-hero-row-2">
          <div class="skoll-hero-chunk" id="hero-we"><span>We</span></div>
          <div class="skoll-hero-chunk" id="hero-chase-2"><span>Chase</span></div>
          <div class="skoll-hero-chunk sun" id="hero-sun"><span>the Sun.</span></div>
        </div>
      </div>
    </h1>
    <p class="skoll-hero-subtext" id="skoll-hero-subtext">
      Strategy. Product.<br>
      Performance. Brand.<br>
      - One compounding system.
    </p>
    <div class="skoll-hero-buttons" id="skoll-hero-buttons">
      <a href="#contact" class="skoll-hero-btn skoll-hero-btn-primary">Start Your Growth</a>
      <a href="#work" class="skoll-hero-btn skoll-hero-btn-secondary">See Our Work</a>
    </div>
  </div>

  <!-- Scroll hint: centered text, breathing animation -->
  <div class="skoll-hero-scroll" aria-hidden="true">
    <span class="skoll-hero-scroll-text">Scroll</span>
  </div>

  <script>
    (function () {
      var wrapper = document.querySelector('.skoll-hero-wrapper');
      if (!wrapper) return;
      var video = wrapper.querySelector('.skoll-hero-video');
      var MOBILE_BREAKPOINT = 768;
      var currentHeroSource = null;
      var resizeTimeout;

      function isMobile() { return window.innerWidth <= MOBILE_BREAKPOINT; }
      function setHeroVideoSource() {
        if (!video) return;
        var src = isMobile() ? 'hero-mobile.mp4' : 'hero-pc.mp4';
        if (currentHeroSource === src) return;
        currentHeroSource = src;
        video.src = src;
        video.load();
        video.muted = true;
        video.play().catch(function () {});
      }
      setHeroVideoSource();
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(setHeroVideoSource, 250);
      });

      function runHeroJS() {
        var gsap = window.gsap;
        if (!gsap) {
          setTimeout(runHeroJS, 50);
          return;
        }

        var headline = document.getElementById('skoll-hero-headline');
        var subtext = document.getElementById('skoll-hero-subtext');
        var buttons = document.getElementById('skoll-hero-buttons');
        var blob = document.getElementById('skoll-hero-blob');
        var particlesEl = document.getElementById('skoll-hero-particles');

        // Ensure background video plays even when section is loaded dynamically
        if (video) {
          video.muted = true;
          var playPromise = video.play();
          if (playPromise && typeof playPromise.then === 'function') {
            playPromise.catch(function () { /* ignore autoplay errors */ });
          }
        }

        // —— Title segment stagger (Eve/Fossil-style chunks) —— 
        var chunks = headline ? headline.querySelectorAll('.skoll-hero-chunk span') : [];
        var tl = gsap.timeline({
          defaults: { ease: 'power3.out' },
          paused: true
        });

        tl.to(chunks, {
          y: 0,
          opacity: 1,
          duration: 0.8,
          stagger: 0.08
        })
        .to(subtext, { opacity: 1, duration: 0.5 }, '-=0.2')
        .to(buttons, {
          y: 0,
          opacity: 1,
          duration: 0.8,
          ease: 'back.out(1.2)'
        }, '-=0.2');

        // —— Gold blob breathing (8s loop) ——
        if (blob) {
          gsap.to(blob, {
            scale: 1.15,
            duration: 4,
            ease: 'sine.inOut',
            repeat: -1,
            yoyo: true
          });
        }

        // —— Floating particles (15–20 dots, slow drift) ——
        if (particlesEl) {
          var count = 18;
          var fragment = document.createDocumentFragment();
          for (var i = 0; i < count; i++) {
            var p = document.createElement('div');
            p.className = 'skoll-hero-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 4 + 's';
            p.style.animationDuration = (6 + Math.random() * 6) + 's';
            p.style.opacity = 0.3 + Math.random() * 0.4;
            p.style.width = (1 + Math.random()) + 'px';
            p.style.height = p.style.width;
            fragment.appendChild(p);
          }
          particlesEl.appendChild(fragment);

          // Add subtle CSS drift via style tag (no new file)
          var style = document.createElement('style');
          style.textContent = '.skoll-hero-particle { animation: skoll-hero-drift 8s ease-in-out infinite; } @keyframes skoll-hero-drift { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(4px, -6px); } 50% { transform: translate(-3px, 4px); } 75% { transform: translate(5px, 2px); } }';
          wrapper.appendChild(style);
        }

        function startHeroAnimation() {
          tl.play(0);
        }

        if (window.__skollPreloaderDone) {
          // Preloader already finished
          startHeroAnimation();
        } else if (window.addEventListener) {
          window.addEventListener('skoll:preloader:done', function () {
            startHeroAnimation();
          }, { once: true });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runHeroJS);
      } else {
        runHeroJS();
      }
    })();
  </script>
</section>
