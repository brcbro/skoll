<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skoll Digital — Grow with Intent</title>
  <meta name="description" content="A full-stack strategic growth agency. Strategy, product, performance and brand — integrated into one system that compounds.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Skoll Digital — Grow with Intent">
  <meta property="og:description" content="A full-stack strategic growth agency. Strategy, product, performance and brand — integrated into one system that compounds.">
  <meta property="og:image" content="">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Skoll Digital — Grow with Intent">
  <meta name="twitter:description" content="A full-stack strategic growth agency. Strategy, product, performance and brand — integrated into one system that compounds.">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { background: #0A0A0A; margin: 0; }
    #skoll-preloader { position: fixed; inset: 0; background: #0A0A0A; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
    #skoll-preloader.skoll-preloader-out { pointer-events: none; }
    .skoll-preloader-word { font-family: 'Instrument Serif', Georgia, serif; font-size: clamp(3rem, 10vw, 5rem); font-weight: 800; letter-spacing: -0.03em; color: #FAFAFA; }
    .skoll-preloader-word span { display: inline-block; opacity: 0; transform: translateY(0.5em); }
    .skoll-preloader-bar-wrap { width: 200px; height: 2px; background: rgba(240, 238, 233,0.1); border-radius: 2px; overflow: hidden; }
    .skoll-preloader-bar { height: 100%; width: 0; background: #C9A84C; border-radius: 2px; transition: width 0.2s ease-out; }
    #skoll-scroll-progress { position: fixed; top: 0; left: 0; height: 2px; background: #C9A84C; z-index: 99998; width: 0%; transform-origin: left; }
  </style>
</head>
<body>
  <div id="skoll-scroll-progress" aria-hidden="true"></div>

  <div id="skoll-preloader">
    <div class="skoll-preloader-word" id="skoll-preloader-word">
      <span>S</span><span>K</span><span>O</span><span>L</span><span>L</span>
    </div>
    <div class="skoll-preloader-bar-wrap">
      <div class="skoll-preloader-bar" id="skoll-preloader-bar"></div>
    </div>
  </div>

  <main id="skoll-main">
    <div id="navbar-container"></div>
    <div id="hero-container"></div>
    <div id="preview-about-container"></div>
    <div id="preview-founder-container"></div>
    <div id="preview-services-container"></div>
    <div id="preview-clientele-container"></div>
    <div id="preview-work-container"></div>
    <div id="preview-testimonials-container"></div>
    <div id="preview-approach-container"></div>
    <div id="footer-container"></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <script>
    window.SKOLL_SECTIONS = [
      { id: 'navbar-container', path: 'sections/navbar.html' },
      { id: 'hero-container', path: 'sections/hero.html' },
      { id: 'preview-about-container', path: 'sections/preview-about.html' },
      { id: 'preview-founder-container', path: 'sections/preview-founder.html' },
      { id: 'preview-services-container', path: 'sections/preview-services.html' },
      { id: 'preview-clientele-container', path: 'sections/preview-clientele.html' },
      { id: 'preview-work-container', path: 'sections/preview-work.html' },
      { id: 'preview-testimonials-container', path: 'sections/preview-testimonials.html' },
      { id: 'preview-approach-container', path: 'sections/preview-approach.html' },
      { id: 'footer-container', path: 'sections/footer.html' }
    ];
  </script>
  <script src="js/page-loader.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
